    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');
            const contentContainer = document.getElementById("article-content");

            if (!articleId) {
                contentContainer.innerHTML = "<p>Article not found.</p>";
                return;
            }

            fetch("json/articles.json")
                .then(res => res.json())
                .then(data => {
                    const article = data.find(item => item.id == articleId);

                    if (article) {
                        const displayImage = (article.image && article.image.trim() !== "")
                            ? article.image
                            : 'images/chedilex.new.logo.jpeg';

                        const articleLink = (article.link !== "")
                            ? `<br>
                                <div class="link-container no-animation">
                                        <i class="fa-solid fa-up-right-from-square"></i>
                                        <a href="${article.link}">Visit the Site</a>
                                    </div>`
                            : "";

                        const newsTitleT = document.getElementById("news-title-t").textContent = article.title;
                        const articleDateT = document.getElementById("article-date-t").textContent = article.day;
                        const formattedDescription = article.description.replace(/\n/g, "<br>");

                        contentContainer.innerHTML = `
                        <article class="article-content">
                            <div class="container">
                                <img src="${displayImage}" alt="${article.title || 'News'}" class="article-main-img">
                                <article class="full-article">
                                    <p class="full-description">${formattedDescription}</p>
                                    ${articleLink}
                                    <hr>
                                    <p class="published">Published: Chedilex Social Media Team</p>
                                </article>
                            </div>
                        </article>
                    `;

                        document.title = article.title || "Article";
                    } else {
                        contentContainer.innerHTML = "<p>Article not found.</p>";
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    contentContainer.innerHTML = "<p>Unable to load article.</p>";
                });
        });
    </script>
