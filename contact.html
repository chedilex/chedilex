<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords"
        content="Chedilex, chedix, software development, custom software, mobile apps, cybersecurity, data analytics, web development, software solutions">
    <meta name="description"
        content="Chedilex Software Solutions delivers innovative, scalable software development services including custom applications, web development, cybersecurity, and data analytics to drive business growth.">
    <meta name="author" content="Eng. Tony EL Chediac">
    <meta name="theme-color" content="#1d4ed8">
    <meta name="robots" content="index, follow">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Chedilex | Contact</title>
    <link rel="icon" type="image/png" href="images/chedilex-logo-removebg.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
</head>

<body>

    <!-- loader code -->
    <div class="loaderMain" id="loader">
        <div class="container">
            <div class="loader">
                <img src="images/chedilex.new.logo.jpeg" alt="logo">
            </div>
        </div>
    </div>

    <!-- back to top button -->
    <button id="backToTop" title="Go to top"><i class="fa-solid fa-arrow-up"></i></button>

    <!-- Particle Background -->
    <div id="particles-js"></div>

    <!-- Header & Navigation -->
    <header id="headerMain">
    </header>

    <!-- Hero Section -->
    <section class="pageHero">
        <div class="pagehero-content">
            <div class="section-title">
                <h2>Contact US</h2>
                <p>We welcome new opportunities and invite you to reach out through the form below.</p>
            </div>
        </div>
    </section>

    <!-- contact us -->
    <section class="section">
        <div class="container">
            <div class="contact-double-content">
                <!-- content 1 -->
                <div class="contact-details-content">
                    <div class="data">
                        <p class="titledata">For Project</p>
                        <p><i class="fa-solid fa-envelope"></i><a href="mailto:chedilex@gmail.com"
                                class="a">chedilex@gmail.com</a></p>
                    </div>
                    <div class="data">
                        <p class="titledata">For Support Call</p>
                        <p><i class="fa-solid fa-phone"></i><a href="tel:+96171096971" class="a">+961 71 09 69 71</a>
                        </p>
                    </div>
                </div>
                <!-- content 2 -->
                <div class="form-content">
                    <form id="contact-form" action="https://formly.email/submit" method="POST">
                        <input type="hidden" name="access_key" value="4b71a068dc2045fe86bb5976c70c0301">
                        <div style="position: absolute; left: -5000px;" aria-hidden="true">
                            <input type="text" name="b_username" tabindex="-1" autocomplete="off">
                        </div>
                        <input type="hidden" name="subject" value="New Contact Form Submission from Chedilex Website">

                        <label for="name">Full Name</label>
                        <input type="text" name="name" id="name" required>

                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" required>

                        <label for="phone">Phone Number</label>
                        <input type="tel" name="phone" id="phone" required>

                        <label for="message">Message</label>
                        <textarea name="message" id="message" rows="4" required></textarea>
                        <p id="showMessage"></p>
                        <input type="submit" value="Send Message">
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.6"></script>
    <script src="js/script.js"></script>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/contact.js"></script>
    <script src="js/particles.js"></script>
</body>

</html>
